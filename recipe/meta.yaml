{% set name = "jsonapi-client" %}
{% set version = "0.9.9" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jsonapi_client-{{ version }}.tar.gz
  sha256: 348bb9efb5f98421f865f8258dae5aa781552a5910351ff578f084292e659cd1

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - aiohttp
    - jsonschema
    - python >={{ python_min }}
    - requests

test:
  imports:
    - jsonapi_client
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/qvantel/jsonapi-client
  summary: Comprehensive, yet easy-to-use, pythonic, ORM-like access to JSON API services
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - sodre
    - emilhaegglund
